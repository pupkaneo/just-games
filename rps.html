<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameZone — Камень-ножницы-бумага</title>
    <meta name="author" content="Дакиев Руслан">
    <meta name="copyright" content="Дакиев Руслан, 2024">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    <style>
        :root {
            --bg-body: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-container: #ffffff;
            --text-primary: #333333;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border-color: #eee;
            --shadow: 0 10px 40px rgba(0,0,0,0.3);
            --bg-card: #f8f9fa;
            --border-card: transparent;
            --slider-bg: #ccc;
        }
        
        [data-theme="dark"] {
            --bg-body: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --bg-container: #1e1e2e;
            --text-primary: #e0e0e0;
            --text-secondary: #aaaaaa;
            --text-muted: #777777;
            --border-color: #3a3a5e;
            --shadow: 0 10px 40px rgba(0,0,0,0.7);
            --bg-card: #2a2a3e;
            --border-card: #3a3a5e;
            --slider-bg: #4a4a6e;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: var(--bg-body);
            margin: 0;
            padding: 40px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.5s ease;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--bg-container);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            text-align: center;
            transition: background 0.4s ease, box-shadow 0.4s ease;
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 5px;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header-left .logo {
            font-size: 30px;
        }
        
        h1 {
            color: var(--text-primary);
            font-size: 28px;
            margin: 0;
            transition: color 0.3s;
        }
        
        .theme-switch-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .theme-switch-wrapper .icon {
            font-size: 18px;
            color: var(--text-secondary);
            transition: color 0.3s;
        }
        
        .theme-switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
            flex-shrink: 0;
        }
        
        .theme-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--slider-bg);
            transition: 0.4s;
            border-radius: 24px;
        }
        
        .slider::before {
            content: "";
            position: absolute;
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: #667eea;
        }
        
        input:checked + .slider::before {
            transform: translateX(24px);
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: 30px;
            margin-top: 5px;
            transition: color 0.3s;
        }
        
        .mode-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin: 30px 0;
        }
        
        .mode-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid var(--border-card);
            color: var(--text-primary);
        }
        
        .mode-card:hover {
            transform: scale(1.02);
            border-color: #667eea;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .mode-card .icon {
            font-size: 50px;
            display: block;
            margin-bottom: 10px;
        }
        
        .mode-card .title {
            font-size: 22px;
            font-weight: bold;
            color: var(--text-primary);
        }
        
        .mode-card .desc {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 5px;
        }
        
        .mode-card .features {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 8px;
            background: var(--bg-container);
            padding: 8px;
            border-radius: 8px;
        }
        
        .mode-card.classic {
            background: #e3f2fd;
        }
        
        [data-theme="dark"] .mode-card.classic {
            background: #1a2a4a;
        }
        
        .mode-card.classic:hover {
            border-color: #2196f3;
        }
        
        .mode-card.advanced {
            background: #fce4ec;
        }
        
        [data-theme="dark"] .mode-card.advanced {
            background: #3a1a2a;
        }
        
        .mode-card.advanced:hover {
            border-color: #e91e63;
        }
        
        .back-btn {
            padding: 12px 30px;
            font-size: 16px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        
        .back-btn:hover {
            background: #5a6268;
            transform: scale(1.05);
        }
        
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid var(--border-color);
            color: var(--text-muted);
            font-size: 12px;
            transition: border-color 0.3s, color 0.3s;
        }
    </style>
</head>

            <div class="header-left">
                <span class="logo">🎮</span>
                <h1>GameZone</h1>
            </div>
            <div class="theme-switch-wrapper">
                <span class="icon">☀️</span>
                <label class="theme
