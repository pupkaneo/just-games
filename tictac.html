<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameZone — Крестики-нолики</title>
    <meta name="author" content="Дакиев Руслан">
    <meta name="copyright" content="Дакиев Руслан, 2024">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            margin: 0;
            padding: 40px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .logo {
            font-size: 40px;
            display: block;
            margin-bottom: 5px;
        }
        
        h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 5px;
        }
        
        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }
        
        .mode-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin: 30px 0;
        }
        
        .mode-card {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid transparent;
        }
        
        .mode-card:hover {
            transform: scale(1.02);
            border-color: #4facfe;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .mode-card .icon {
            font-size: 50px;
            display: block;
            margin-bottom: 10px;
        }
        
        .mode-card .title {
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }
        
        .mode-card .desc {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .mode-card .features {
            color: #888;
            font-size: 13px;
            margin-top: 8px;
            background: white;
            padding: 8px;
            border-radius: 8px;
        }
        
        .mode-card.bot {
            background: #e3f2fd;
        }
        
        .mode-card.bot:hover {
            border-color: #2196f3;
        }
        
        .mode-card.player {
            background: #fce4ec;
        }
        
        .mode-card.player:hover {
            border-color: #e91e63;
        }
        
        .back-btn {
            padding: 12px 30px;
            font-size: 16px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        
        .back-btn:hover {
            background: #5a6268;
            transform: scale(1.05);
        }
        
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="logo">🎮</span>
        <h1>GameZone</h1>
        <p class="subtitle">❌ Крестики-нолики — выбери режим</p>
        
        <div class="mode-grid">
            <div class="mode-card bot" onclick="window.location.href='tictac-bot.html'">
                <span class="icon">🤖</span>
                <div class="title">Игра с ботом</div>
                <div class="desc">Сразитесь с умным компьютером</div>
                <div class="features">🧠 Бот выбирает лучший ход • 🤖 Сложность возрастает</div>
            </div>
            
            <div class="mode-card player" onclick="window.location.href='tictac-player.html'">
                <span class="icon">👥</span>
                <div class="title">Игра с игроком</div>
                <div class="desc">Играйте с другом на одном устройстве</div>
                <div class="features">👫 По очереди • 🏆 Кто первый выиграет</div>
            </div>
        </div>
        
        <button class="back-btn" onclick="window.location.href='index.html'">🏠 На главную</button>
        
        <div class="footer">
            © 2024 Все права защищены. GameZone
        </div>
    </div>
</body>
</html>
