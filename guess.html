<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameZone — Угадай число</title>
    <meta name="author" content="Дакиев Руслан">
    <meta name="copyright" content="Дакиев Руслан, 2024">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            margin: 0;
            padding: 40px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 550px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .logo {
            font-size: 40px;
            display: block;
            margin-bottom: 5px;
        }
        
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 5px;
        }
        
        .range-badge {
            display: inline-block;
            background: #f5576c;
            color: white;
            padding: 5px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .input-area {
            margin: 20px 0;
        }
        
        input {
            padding: 12px 20px;
            font-size: 20px;
            width: 180px;
            border: 2px solid #ddd;
            border-radius: 10px;
            text-align: center;
            transition: border-color 0.3s;
        }
        
        input:focus {
            border-color: #f5576c;
            outline: none;
        }
        
        button {
            padding: 12px 30px;
            font-size: 18px;
            background: #f5576c;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 5px;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #d9445a;
            transform: scale(1.05);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .btn-new {
            background: #6c757d;
        }
        
        .btn-new:hover {
            background: #5a6268;
        }
        
        .message {
            font-size: 22px;
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            min-height: 60px;
            font-weight: bold;
        }
        
        .attempts {
            color: #666;
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0 20px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            border-radius: 10px;
            transition: width 0.5s ease;
            width: 100%;
        }
        
        .hint {
            color: #999;
            font-size: 14px;
            margin-top: 10px;
        }
        
        .back-btn {
            background: #6c757d;
            margin-top: 10px;
        }
        
        .back-btn:hover {
            background: #5a6268;
        }
        
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
            color: #999;
            font-size: 12px;
        }
        
        .win {
            color: #28a745;
        }
        
        .lose {
            color: #dc3545;
        }
        
        .hint-text {
            color: #f5576c;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="logo">🎮</span>
        <h1>GameZone — Угадай число</h1>
        <div class="range-badge">🎯 от 1 до 1000</div>
        <p class="subtitle">У тебя 10 попыток!</p>
        
        <div class="input-area">
            <input type="number" id="guessInput" min="1" max="1000" placeholder="1-1000">
            <br><br>
            <button onclick="checkGuess()">✅ Проверить</button>
            <button class="btn-new" onclick="newGame()">🔄 Новая игра</button>
        </div>
        
        <div class="attempts" id="attempts">Попыток: 0 из 10</div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div class="message" id="message">💡 Введи число от 1 до 1000</div>
        <div class="hint" id="hint">⬆️ ⬇️</div>
        
        <button class="back-btn" onclick="window.location.href='index.html'">🏠 На главную</button>
        
        <div class="footer">
            © 2024 Все права защищены. GameZone
        </div>
    </div>
    
    <script>
        // ============================================================
        // Автор: Дакиев Руслан
        // Игра: Угадай число (1-1000, 10 попыток)
        // ============================================================
        
        const MIN_NUMBER = 1;
        const MAX_NUMBER = 1000;
        const MAX_ATTEMPTS = 10;
        
        let secretNumber = Math.floor(Math.random() * (MAX_NUMBER - MIN_NUMBER + 1)) + MIN_NUMBER;
        let attempts = 0;
        let gameOver = false;
        let lastGuess = null;
        
        const input = document.getElementById('guessInput');
        const messageEl = document.getElementById('message');
        const attemptsEl = document.getElementById('attempts');
        const progressFill = document.getElementById('progressFill');
        const hintEl = document.getElementById('hint');
        
        function checkGuess() {
            if (gameOver) {
                messageEl.innerHTML = '⛔ Игра окончена! Нажми "Новая игра"';
                messageEl.className = 'message lose';
                return;
            }
            
            const guess = parseInt(input.value);
            
            if (input.value === '') {
                messageEl.innerHTML = '⚠️ Введи число!';
                messageEl.className = 'message';
                return;
            }
            
            if (isNaN(guess)) {
                messageEl.innerHTML = '⚠️ Это не число!';
                messageEl.className = 'message';
                input.value = '';
                return;
            }
            
            if (guess < MIN_NUMBER || guess > MAX_NUMBER) {
                messageEl.innerHTML = `⚠️ Число должно быть от ${MIN_NUMBER} до ${MAX_NUMBER}!`;
                messageEl.className = 'message';
                input.value = '';
                return;
            }
            
            attempts++;
            lastGuess = guess;
            updateUI();
            
            if (guess === secretNumber) {
                messageEl.innerHTML = `🎉🎉🎉 Ты угадал! Это было число ${secretNumber}! Поздравляю! 🎉🎉🎉`;
                messageEl.className = 'message win';
                gameOver = true;
                hintEl.textContent = '🏆 Ты победил!';
                return;
            }
            
            if (guess < secretNumber) {
                messageEl.innerHTML = `📈 Загаданное число БОЛЬШЕ, чем ${guess}`;
                messageEl.className = 'message hint-text';
                hintEl.textContent = '⬆️ Попробуй число побольше';
            } else {
                messageEl.innerHTML = `📉 Загаданное число МЕНЬШЕ, чем ${guess}`;
                messageEl.className = 'message hint-text';
                hintEl.textContent = '⬇️ Попробуй число поменьше';
            }
            
            if (attempts >= MAX_ATTEMPTS) {
                messageEl.innerHTML = `😢 Ты проиграл! Я загадал число ${secretNumber}. Попробуй ещё раз!`;
                messageEl.className = 'message lose';
                gameOver = true;
                hintEl.textContent = '💪 Не сдавайся! Новая игра — новый шанс!';
            }
            
            input.value = '';
            input.focus();
        }
        
        function updateUI() {
            attemptsEl.textContent = `Попыток: ${attempts} из ${MAX_ATTEMPTS}`;
            
            const progress = ((MAX_ATTEMPTS - attempts) / MAX_ATTEMPTS) * 100;
            progressFill.style.width = `${progress}%`;
            
            if (attempts >= 8) {
                progressFill.style.background = 'linear-gradient(90deg, #f5576c, #ff6b6b)';
            } else if (attempts >= 5) {
                progressFill.style.background = 'linear-gradient(90deg, #f093fb, #f5576c)';
            } else {
                progressFill.style.background = 'linear-gradient(90deg, #4facfe, #00f2fe)';
            }
        }
        
        function newGame() {
            secretNumber = Math.floor(Math.random() * (MAX_NUMBER - MIN_NUMBER + 1)) + MIN_NUMBER;
            attempts = 0;
            gameOver = false;
            lastGuess = null;
            
            messageEl.innerHTML = '🔄 Новая игра! Введи число от 1 до 1000';
            messageEl.className = 'message';
            hintEl.textContent = '⬆️ ⬇️';
            progressFill.style.width = '100%';
            progressFill.style.background = 'linear-gradient(90deg, #4facfe, #00f2fe)';
            attemptsEl.textContent = `Попыток: 0 из ${MAX_ATTEMPTS}`;
            input.value = '';
            input.focus();
        }
        
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkGuess();
            }
        });
        
        window.onload = function() {
            input.focus();
        };
    </script>
</body>
</html>
