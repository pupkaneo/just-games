    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            margin: 0;
            padding: 40px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .logo {
            font-size: 30px;
            display: block;
            margin-bottom: 5px;
        }
        
        h1 {
            color: #333;
            font-size: 26px;
            margin-bottom: 5px;
        }
        
        .badge {
            display: inline-block;
            background: #f5576c;
            color: white;
            padding: 4px 15px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 15px;
        }
        
        .status {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .choices {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 25px 0;
            flex-wrap: wrap;
        }
        
        .choice-btn {
            font-size: 32px;
            padding: 15px 20px;
            border: 3px solid #ddd;
            border-radius: 15px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 80px;
        }
        
        .choice-btn:hover:not(:disabled) {
            transform: scale(1.1);
            border-color: #f5576c;
            background: #f0f0ff;
        }
        
        .choice-btn:active:not(:disabled) {
            transform: scale(0.9);
        }
        
        .choice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: scale(0.95);
        }
        
        .choice-btn .btn-label {
            display: block;
            font-size: 11px;
            color: #666;
            margin-top: 3px;
        }
        
        .result-area {
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            min-height: 120px;
        }
        
        .computer-choice {
            font-size: 18px;
            color: #666;
            min-height: 30px;
        }
        
        .computer-choice .emoji {
            font-size: 30px;
            display: inline-block;
            transition: all 0.5s;
        }
        
        .result-text {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
            min-height: 40px;
        }
        
        .thinking {
            animation: pulse 0.5s ease-in-out infinite alternate;
        }
        
        @keyframes pulse {
            from { opacity: 0.4; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1.1); }
        }
        
        .score {
            font-size: 18px;
            color: #333;
            margin-top: 10px;
        }
        
        .score span {
            font-weight: bold;
        }
        
        .score .player-score { color: #28a745; }
        .score .computer-score { color: #dc3545; }
        .score .ties-score { color: #ffc107; }
        
        .buttons-bottom {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        
        .reset-btn, .back-btn, .mode-btn {
            padding: 10px 25px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .reset-btn {
            background: #dc3545;
            color: white;
        }
        
        .reset-btn:hover {
            background: #c82333;
            transform: scale(1.05);
        }
        
        .mode-btn {
            background: #f5576c;
            color: white;
        }
        
        .mode-btn:hover {
            background: #d9445a;
            transform: scale(1.05);
        }
        
        .back-btn {
            background: #6c757d;
            color: white;
        }
        
        .back-btn:hover {
            background: #5a6268;
            transform: scale(1.05);
        }
