<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameZone — Камень-ножницы-бумага-ящерица-Спок</title>
    <meta name="author" content="Дакиев Руслан">
    <meta name="copyright" content="Дакиев Руслан, 2024">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    <style>
        :root {
            --bg-body: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --bg-container: #ffffff;
            --text-primary: #333333;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border-color: #eee;
            --shadow: 0 10px 40px rgba(0,0,0,0.3);
            --bg-card: #f8f9fa;
            --border-card: #ddd;
            --badge-bg: #f5576c;
            --badge-text: white;
            --btn-reset-bg: #dc3545;
            --btn-reset-hover: #c82333;
            --btn-mode-bg: #f5576c;
            --btn-mode-hover: #d9445a;
            --btn-back-bg: #6c757d;
            --btn-back-hover: #5a6268;
            --slider-bg: #ccc;
            --result-bg: #f8f9fa;
        }
        
        [data-theme="dark"] {
            --bg-body: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            --bg-container: #1a1a2e;
            --text-primary: #e0e0e0;
            --text-secondary: #aaaaaa;
            --text-muted: #777777;
            --border-color: #3a3a5e;
            --shadow: 0 10px 40px rgba(0,0,0,0.7);
            --bg-card: #2a2a4a;
            --border-card: #3a3a5e;
            --badge-bg: #f5576c;
            --badge-text: white;
            --btn-reset-bg: #dc3545;
            --btn-reset-hover: #c82333;
            --btn-mode-bg: #f5576c;
            --btn-mode-hover: #d9445a;
            --btn-back-bg: #4a4a6e;
            --btn-back-hover: #5a5a7e;
            --slider-bg: #4a4a6e;
            --result-bg: #2a2a4a;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: var(--bg-body);
            margin: 0;
            padding: 40px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.5s ease;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: var(--bg-container);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            text-align: center;
            transition: background 0.4s ease, box-shadow 0.4s ease;
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 5px;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header-left .logo {
            font-size: 30px;
        }
        
        h1 {
            color: var(--text-primary);
            font-size: 24px;
            margin: 0;
            transition: color 0.3s;
        }
        
        .theme-switch-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .theme-switch-wrapper .icon {
            font-size: 18px;
            color: var(--text-secondary);
            transition: color 0.3s;
        }
        
        .theme-switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
            flex-shrink: 0;
        }
        
        .theme-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--slider-bg);
            transition: 0.4s;
            border-radius: 24px;
        }
        
        .slider::before {
            content: "";
            position: absolute;
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: #667eea;
        }
        
        input:checked + .slider::before {
            transform: translateX(24px);
        }
        
        .badge {
            display: inline-block;
            background: var(--badge-bg);
            color: var(--badge-text);
            padding: 4px 15px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 15px;
        }
        
        .status {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 20px;
            min-height: 24px;
            transition: color 0.3s;
        }
        
        .choices {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .choice-btn {
            font-size: 28px;
            padding: 15px 18px;
            border: 3px solid var(--border-card);
            border-radius: 15px;
            background: var(--bg-card);
            cursor: pointer;
            transition: all 0.3s;
            min-width: 70px;
            color: var(--text-primary);
        }
        
        .choice-btn:hover:not(:disabled) {
            transform: scale(1.1);
            border-color: #f5576c;
            background: var(--bg-container);
        }
